name: Coverage
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  check:
    name: Check
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ github.token }}

      - name: Node Setup
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Dependencies
        run: npm ci

      - name: Coverage Report
        run: npm run cover:report

      - name: Coverage Extraction
        run: npm run cover:extract

      - name: Badge Update
        if: github.event_name == 'push'
        run: |
          git config --global user.email "software@nicolawealth.com"
          git config --global user.name "actlion"
          git remote set-url origin https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git
          if ! git diff --quiet codecov/badge.json; then
            git add codecov/badge.json
            git commit -m "Update coverage badge"
            git push origin main
          fi

