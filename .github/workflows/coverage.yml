name: Coverage
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  check:
    name: Check
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ github.token }}

      - name: Node Setup
        uses: actions/setup-node@v6
        with:
          node-version: '22.17.1'
          cache: 'npm'

      - name: Dependencies
        run: npm ci

      - name: Coverage Report
        env:
          NODE_OPTIONS: ""
          TS_NODE_PROJECT: tsconfig.json
        run: npx nyc --nycrc-path nyc.config.cjs --reporter=html --reporter=lcov --reporter=text --reporter=json mocha --config .mocharc.cjs -c --reporter=spec

      - name: Coverage Extraction
        run: npm run cover:extract

      - name: Badge Update
        if: github.event_name == 'push'
        run: |
          git config --global user.email "software@nicolawealth.com"
          git config --global user.name "actlion"
          git remote set-url origin https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git
          if ! git diff --quiet codecov/badge.json; then
            git add codecov/badge.json
            git commit -m "Update coverage badge"
            git push origin ${{ github.ref_name }}
          fi

